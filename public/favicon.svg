<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="spark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#bfdbfe"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>

  <!-- Subtle inner glow -->
  <rect width="32" height="32" rx="8" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

  <!-- PDF document shape -->
  <rect x="7" y="5" width="13" height="17" rx="2" fill="rgba(255,255,255,0.15)"/>
  <rect x="7" y="5" width="13" height="17" rx="2" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
  <!-- dog-ear fold -->
  <path d="M17 5 L20 8 L17 8 Z" fill="rgba(255,255,255,0.3)"/>
  <!-- text lines on doc -->
  <line x1="9.5" y1="11" x2="17.5" y2="11" stroke="rgba(255,255,255,0.5)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="9.5" y1="13.5" x2="17.5" y2="13.5" stroke="rgba(255,255,255,0.5)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="9.5" y1="16" x2="14.5" y2="16" stroke="rgba(255,255,255,0.35)" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Spark / star in bottom right -->
  <g transform="translate(19.5, 21)">
    <!-- 4-point star -->
    <path d="M0,-5 L1.2,-1.2 L5,0 L1.2,1.2 L0,5 L-1.2,1.2 L-5,0 L-1.2,-1.2 Z" 
          fill="url(#spark)" 
          transform="scale(0.72)"/>
  </g>
</svg>
